name: Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main

permissions:
  contents: read

jobs:
  app-ci:
    name: App CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Detect app test script
        id: app-test-script
        run: node -e 'process.stdout.write(`exists=${Boolean(require("./package.json").scripts?.test)}\n`)' >> "$GITHUB_OUTPUT"

      - name: Lint app
        run: npm run lint

      - name: Typecheck app
        run: npm run typecheck

      - name: Run app tests
        if: steps.app-test-script.outputs.exists == 'true'
        run: |
          npx playwright install --with-deps chromium
          npm test

      - name: Build app
        run: npm run build

  functions-ci:
    name: Functions CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci

      - name: Detect functions test script
        id: functions-test-script
        run: node -e 'process.stdout.write(`exists=${Boolean(require("./package.json").scripts?.test)}\n`)' >> "$GITHUB_OUTPUT"

      - name: Lint functions
        run: npm run lint

      - name: Run functions tests
        if: steps.functions-test-script.outputs.exists == 'true'
        run: npm test

  deploy-vercel-development:
    name: Deploy Vercel Preview
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/development'
    needs:
      - app-ci
    runs-on: ubuntu-latest
    environment: Development
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel preview artifacts
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel preview artifacts
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-vercel-production:
    name: Deploy Vercel Production
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs:
      - app-ci
    runs-on: ubuntu-latest
    environment: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel production artifacts
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-functions-development:
    name: Deploy Firebase Functions Development
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/development'
    needs:
      - functions-ci
    runs-on: ubuntu-latest
    environment: Development
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'where2pweb' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy Firebase functions
        run: firebase deploy --only functions --project "$FIREBASE_PROJECT_ID"

  deploy-functions-production:
    name: Deploy Firebase Functions Production
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs:
      - functions-ci
    runs-on: ubuntu-latest
    environment: Production
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'where2pweb' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy Firebase functions
        run: firebase deploy --only functions --project "$FIREBASE_PROJECT_ID"
